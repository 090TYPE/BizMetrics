services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bizmetrics
      POSTGRES_USER: bizmetrics
      POSTGRES_PASSWORD: bizmetrics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizmetrics"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/BizMetrics.Api/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=bizmetrics;Username=bizmetrics;Password=bizmetrics"
      ASPNETCORE_ENVIRONMENT: Development
      Cors__Origins__0: "http://localhost:5173"
      # Inside the compose network the API reaches MinIO at "minio"; presigned
      # URLs handed to the browser must use "localhost".
      Storage__Endpoint: "http://minio:9000"
      Storage__PublicEndpoint: "http://localhost:9000"
      # Stripe billing — set these to real test-mode keys to enable billing.
      # Leave blank to run in demo mode (billing UI shown but checkout disabled).
      Stripe__SecretKey: ""
      Stripe__WebhookSecret: ""
      Stripe__ProPriceId: ""
      Stripe__BusinessPriceId: ""
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
