services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bizmetrics
      POSTGRES_USER: bizmetrics
      POSTGRES_PASSWORD: bizmetrics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizmetrics"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/BizMetrics.Api/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=bizmetrics;Username=bizmetrics;Password=bizmetrics"
      ASPNETCORE_ENVIRONMENT: Development
      Cors__Origins__0: "http://localhost:5173"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
