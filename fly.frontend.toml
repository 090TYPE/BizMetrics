# Fly.io config for the BizMetrics React frontend (nginx static)
# Deploy: fly deploy --config fly.frontend.toml
# Build args are passed as secrets so VITE_ vars are baked at build time.

app = "bizmetrics-web"
primary_region = "iad"

[build]
  dockerfile = "frontend/Dockerfile.prod"
  [build.args]
    VITE_API_URL = "https://bizmetrics-api.fly.dev"
    # Override VITE_GOOGLE_CLIENT_ID via `fly secrets set` on the frontend app
    # (Fly passes secrets as build args when set on the app)

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "3s"
