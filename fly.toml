# Fly.io config for the BizMetrics API
# Deploy: fly deploy
# Secrets: fly secrets set Jwt__SigningKey=... Stripe__SecretKey=... etc.

app = "bizmetrics-api"
primary_region = "iad"

[build]
  dockerfile = "src/BizMetrics.Api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  # Non-secret config. Secrets go in `fly secrets set`.
  DEMO_SEED = "true"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Liveness probe
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

# Readiness probe (DB + storage)
[[http_service.checks]]
  grace_period = "15s"
  interval = "60s"
  method = "GET"
  path = "/health/detail"
  timeout = "10s"

# ── Required secrets (set via `fly secrets set KEY=value`) ─────────────────
# Jwt__SigningKey           — random 32+ char secret
# Jwt__Issuer               — https://your-api.fly.dev
# Jwt__Audience             — https://your-api.fly.dev
# ConnectionStrings__Postgres — Fly Postgres attach sets DATABASE_URL;
#                               map it: ConnectionStrings__Postgres=$DATABASE_URL
# Storage__Endpoint         — e.g. https://s3.us-east-1.amazonaws.com (or MinIO URL)
# Storage__AccessKey        — AWS/MinIO access key
# Storage__SecretKey        — AWS/MinIO secret key
# Storage__BucketName       — e.g. bizmetrics-uploads
# Stripe__SecretKey         — sk_live_... or sk_test_...
# Stripe__WebhookSecret     — whsec_...
# Google__ClientId          — Google OAuth client ID
# Sentry__Dsn               — Sentry DSN (optional)
